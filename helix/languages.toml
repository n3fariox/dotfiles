[[language]]
name = "python"
language-servers = [ "pyright" ]
formatter = { command = "ruff", args = ["format", "--line-length", "88", "-"] }
auto-format = true

[language-server.docker-compose-ls]
command = "docker-compose-langserver"
args = ["--stdio"]

[language-server.pbls]
command = "pbls"

[[language]]
name = "docker-compose"
language-servers = ["docker-compose-ls"]

[[language]]
name = "protobuf"
language-servers = ["pbls"]
